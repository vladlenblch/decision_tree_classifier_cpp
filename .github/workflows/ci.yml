name: CI

permissions:
  contents: write
  actions: read

on:
  push:
    branches:
      - 'features'
    tags:
      - 'v*'

jobs:
  test-with-asan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake libgtest-dev

    - name: Configure CMake (ASan ON)
      run: cmake -B build -DENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run unit tests with ASan
      run: ctest --test-dir build --output-on-failure --verbose

    - name: Run main program with ASan
      run: |
        echo "Running main classifier with ASan"
        ./build/DecisionTreeClassifier
        if [ $? -eq 0 ]; then
            echo "Main program passed - no memory errors detected"
        fi

  benchmarks:
    runs-on: ubuntu-latest
    needs: test-with-asan

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake libgtest-dev libbenchmark-dev
    
    - name: Configure CMake (ASan OFF)
      run: cmake -B build -DENABLE_ASAN=OFF -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build
    
    - name: Run benchmarks
      run: |
        echo "Running Google Benchmark"
        ./build/tree_benchmark --benchmark_min_time=1s

  release:
    runs-on: ${{ matrix.os }}
    needs: [test-with-asan, benchmarks]
    if: startsWith(github.ref, 'refs/tags/')
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_path: "build/DecisionTreeClassifier"
          - os: macos-latest
            binary_path: "build/DecisionTreeClassifier"
          - os: windows-latest
            binary_path: "build/Release/DecisionTreeClassifier.exe"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake -y

    - name: Configure CMake
      run: cmake -B build -DENABLE_ASAN=OFF -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.binary_path }}
          banknotes.txt
        generate_release_notes: true
        name: Release ${{ github.ref_name }}
